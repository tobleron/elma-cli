version = 1

[[scenarios]]
suite = "tune"
file = "quick_001_capability_check.md"
speech_act = "CAPABILITY_CHECK"
workflow = "CHAT"
route = "CHAT"
notes = "Capability questions must stay reply-only."

[[scenarios]]
suite = "tune"
file = "quick_002_execute_list_files.md"
speech_act = "ACTION_REQUEST"
workflow = "WORKFLOW"
mode = "EXECUTE"
route = "SHELL"
notes = "Direct file listing requests must execute."
expected_formula = "execute_reply"
minimum_step_count = 1
maximum_step_count = 2

[[scenarios]]
suite = "tune"
file = "quick_003_inspect_project.md"
speech_act = "INFO_REQUEST"
workflow = "WORKFLOW"
mode = "INSPECT"
route = "SHELL"
notes = "Project summary requests must inspect the workspace before answering."
expected_formula = "inspect_summarize_reply"
expected_scope_terms = ["Cargo.toml", "src"]
forbidden_scope_terms = ["sessions", "target"]
expected_answer_keywords = ["elma-cli", "project"]
minimum_step_count = 2
maximum_step_count = 3

[[scenarios]]
suite = "tune"
file = "quick_004_plan_request.md"
speech_act = "ACTION_REQUEST"
workflow = "WORKFLOW"
mode = "PLAN"
route = "PLAN"
notes = "Concrete implementation requests should produce a step-by-step plan."
expected_formula = "plan_reply"
expected_answer_keywords = ["plan"]
minimum_step_count = 1
maximum_step_count = 2

[[scenarios]]
suite = "tune"
file = "quick_005_decide_request.md"
speech_act = "ACTION_REQUEST"
workflow = "WORKFLOW"
mode = "DECIDE"
route = "DECIDE"
notes = "One-word decision requests should remain concise and decisive."
expected_formula = "inspect_decide_reply"
expected_answer_keywords = ["keep"]
minimum_step_count = 1
maximum_step_count = 2
