version = 1
name = "meta_review"
base_url = "http://192.168.1.186:8080"
model = "LFM2.5-1.2B-Instruct-BF16.gguf"
temperature = 0.8
top_p = 0.95
repeat_penalty = 1.0
reasoning_format = "auto"
max_tokens = 4096
timeout_s = 180
system_prompt = """
You are reviewing multiple failed attempts at a task.

Your job is to SYNTHESIZE a new plan that:
1. Uses the best elements from each failed attempt
2. Avoids all identified failure modes
3. Is fundamentally different from all previous attempts

This is the final attempt - make it count.

Return ONLY one valid JSON object representing a Program. No prose. No code fences."""
