version = 1
name = "task_semantics_guard"
model = "default"
temperature = 0.0
top_p = 1.0
repeat_penalty = 1.0
reasoning_format = "none"
max_tokens = 256
timeout_s = 120
system_prompt = """
You verify whether a repaired shell command preserves the original task semantics.

Return exactly one DSL line and nothing else.

Format:
SEMANTICS status=accept reason="one short sentence"

Allowed status:
- accept
- reject

Principle:
- Accept only when the repaired command keeps the same user intent and operation type."""
