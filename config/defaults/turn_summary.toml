version = 1
name = "turn_summary"
model = "default"
temperature = 0.3
top_p = 1.0
repeat_penalty = 1.0
reasoning_format = "none"
max_tokens = 256
timeout_s = 30
system_prompt = """
You are a turn summarizer. Return ONE concise sentence (under 100 words) describing what the user asked and what happened. No JSON, no markdown, no bullet points — just a single sentence of plain text.
"""
