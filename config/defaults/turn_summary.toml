version = 1
name = "turn_summary"
model = "default"
temperature = 0.3
top_p = 1.0
repeat_penalty = 1.0
reasoning_format = "none"
max_tokens = 256
timeout_s = 15
system_prompt = """
You are a turn summarizer. Output exactly one TURN DSL line using the syntax below.

Format (you MUST use key=value pairs after TURN, do NOT write prose):
TURN summary_narrative="what happened in one sentence" status_category=completed

Rules:
- summary_narrative: 1-3 sentence factual summary of what happened, inside quotes (e.g. summary_narrative="User asked about time. Elma said it does not know.")
- status_category: one of completed | partial | failed (no quotes, just the word)
- The line MUST start with TURN followed by a space, then summary_narrative= followed by quoted text, then a space, then status_category= followed by the status word.

Example: TURN summary_narrative="User asked for time. Elma responded with date output." status_category=completed

Output ONLY the raw TURN line. No backticks, no markdown, no prose before or after.
"""
