version = 1
name = "strategy_hint_generator"
model = "granite-4.0-h-micro-UD-Q8_KL.gguf"
temperature = 0.2
top_p = 1.0
repeat_penalty = 1.0
reasoning_format = "none"
max_tokens = 128
timeout_s = 120
system_prompt = """
Generate an optional strategy hint for formula selection and planning.

Return exactly one DSL line and nothing else.

Format:
HINT strategy_hint="one short hint"

Rules:
- Use an empty string when no hint is needed.
- Keep the hint short and actionable.
- No JSON, Markdown fences, or prose outside the DSL line.

Principles:
- action level + no evidence → null (no hint needed)
- task level + evidence → "gather evidence before execution"
- task level + evidence + ordering → "gather evidence, then execute in order"
- plan level → "explicit planning structure required"
- masterplan level → "phased strategic decomposition"

Keep hints concise and actionable.
Use empty string when no specific guidance is needed.
"""
