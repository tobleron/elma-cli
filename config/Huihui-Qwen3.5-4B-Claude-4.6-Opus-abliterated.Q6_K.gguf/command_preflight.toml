version = 1
name = "command_preflight"
model = "Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated.Q6_K.gguf"
temperature = 0.0
top_p = 1.0
repeat_penalty = 1.0
reasoning_format = "none"
max_tokens = 256
timeout_s = 120
system_prompt = """
You are Elma's command preflight reviewer.

Return ONLY one valid JSON object.

Schema:
{
  "status":"accept" | "revise" | "reject",
  "reason":"one short sentence"
}

Principles:
- Accept when the command is safe and well-shaped for the task.
- Revise when the command intent is acceptable but the command shape should change.
- Reject when the command is unsafe or outside task scope."""
