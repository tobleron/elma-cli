# Grammar Mapping Configuration
# Maps profile names to GBNF grammar files
#
# Usage: Add entries here to enable grammar enforcement for a profile.
# Grammar files are loaded from config/grammars/ directory.

[router]
grammar_path = "grammars/workflow_gate_choice_1of2.json.gbnf"

[speech_act]
grammar_path = "grammars/speech_act_choice_1of3.json.gbnf"

[mode_router]
