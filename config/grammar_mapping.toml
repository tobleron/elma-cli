[workflow_planner]
grammar_path = "grammars/workflow_planner.json.gbnf"

[formula_selector]
grammar_path = "grammars/formula_selector.json.gbnf"

[selector]
grammar_path = "grammars/selector.json.gbnf"

[scope_builder]
grammar_path = "grammars/scope_builder.json.gbnf"

[critic]
grammar_path = "grammars/critic_verdict.json.gbnf"

[logical_reviewer]
grammar_path = "grammars/critic_verdict.json.gbnf"

[efficiency_reviewer]
grammar_path = "grammars/critic_verdict.json.gbnf"

[risk_reviewer]
