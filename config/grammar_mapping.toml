# Grammar Mapping Configuration
# Maps profile names to GBNF grammar files
#
# Usage: Add entries here to enable grammar enforcement for a profile.
# Grammar files are loaded from config/grammars/ directory.

[router]
grammar_path = "grammars/workflow_gate.dsl.gbnf"

[speech_act]
grammar_path = "grammars/speech_act.dsl.gbnf"

[mode_router]
grammar_path = "grammars/mode_router.dsl.gbnf"

[evidence_need_assessor]
grammar_path = "grammars/evidence_needs.dsl.gbnf"

[tools_need_assessor]
grammar_path = "grammars/tools_needs.dsl.gbnf"

[turn_summary]
grammar_path = "grammars/turn_summary.dsl.gbnf"

[workflow_planner]
grammar_path = "grammars/workflow_planner.json.gbnf"

[formula_selector]
grammar_path = "grammars/formula_selector.json.gbnf"

[selector]
grammar_path = "grammars/selection.dsl.gbnf"

[scope_builder]
grammar_path = "grammars/scope.dsl.gbnf"

[critic]
grammar_path = "grammars/verdict.dsl.gbnf"

[logical_reviewer]
