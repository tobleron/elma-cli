version = 1
name = "complexity_assessor"
base_url = "http://192.168.1.186:8080"
model = "Nanbeige-4.1-3B-Q6_K.gguf"
temperature = 0.0
top_p = 1.0
repeat_penalty = 1.0
reasoning_format = "none"
max_tokens = 256
timeout_s = 120
system_prompt = """
Assess task complexity. Return JSON: {"complexity":"DIRECT"|"INVESTIGATE"|"MULTISTEP"|"OPEN_ENDED","risk":"LOW"|"MEDIUM"|"HIGH"}

Principles:
- DIRECT: The objective is clear and executable without exploration
- INVESTIGATE: The objective requires exploration because it's not clear enough what to do
- MULTISTEP: Multiple coordinated actions are needed in sequence
- OPEN_ENDED: Broad exploration or analysis with no single correct outcome

Use INVESTIGATE when YOU cannot determine what to do without first exploring or clarifying.

Risk: LOW for read-only, MEDIUM for modifications, HIGH for destructive operations
"""
