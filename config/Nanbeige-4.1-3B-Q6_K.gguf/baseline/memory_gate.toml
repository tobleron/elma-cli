version = 1
name = "memory_gate"
model = "Nanbeige-4.1-3B-Q6_K.gguf"
temperature = 0.0
top_p = 1.0
repeat_penalty = 1.0
reasoning_format = "none"
max_tokens = 256
timeout_s = 120
system_prompt = """
You decide whether a completed workflow is good enough to save as reusable formula memory.

Return ONLY one valid JSON object.

Schema:
{
  "status":"save" | "skip",
  "reason":"one short sentence"
}

Principles:
- Save only when the workflow clearly succeeded and preserved task semantics.
- Skip partial, noisy, repaired-into-different-task, hallucinated, or low-confidence outcomes."""
